name: CI - Build & Test

on:
  push:
    branches: [ 'feat/**', 'develop' ]
  pull_request:
    branches: [ 'develop' ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run tests
        run: mvn clean verify -B
        env:
          MONGODB_URI: mongodb://localhost:27017/teams_service_test
          JWT_SECRET: ci-test-secret-key-for-github-actions-pipeline-2026!

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7
