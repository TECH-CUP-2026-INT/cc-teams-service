spring:
  application:
    name: service-teams

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/teams_service}

server:
  port: ${SERVER_PORT:8082}

# JWT Configuration (shared secret with identity-service, validation only)
jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyChangeInProduction2026!}

# Communications Service
communications:
  base-url: ${COMMUNICATIONS_URL:http://localhost:8083}

# Logging
logging:
  level:
    root: INFO
    co.edu.escuelaing.techcup.teams: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
