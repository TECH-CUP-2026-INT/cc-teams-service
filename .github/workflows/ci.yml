name: CI - Build & Test

on:
  push:
    branches: [ 'feat/**', 'develop' ]
  pull_request:
    branches: [ 'develop' ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run tests
        run: mvn clean verify -B
        env:
          MONGODB_URI: mongodb://localhost:27017/teams_service_test
          JWT_SECRET: ci-test-secret-key-for-github-actions-pipeline-2026!

      - name: Subir resultados de pruebas
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  sonar:
    name: Análisis SonarCloud
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Análisis SonarCloud
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=tech-cup-2026-int
            -Dsonar.projectKey=TECH-CUP-2026-INT_cc-teams-service
            -Dsonar.projectName=cc-teams-service
            -Dsonar.java.source=21
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
