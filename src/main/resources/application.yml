server:
  port: 8082
  address: 0.0.0.0
spring:
  data:
    mongodb:
      uri: mongodb://host.docker.internal:27018/teams_db

management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: cc-teams-service
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
